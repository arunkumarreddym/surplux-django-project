<h2>Donation / Sales History</h2>

{% for food in foods %}

<div class="card">

<h3>{{ food.name }}</h3>

<p>Quantity: {{ food.quantity }}</p>

<p>Status: {{ food.status }}</p>

<p>Received By: {{ food.claimed_by.username }}</p>

<p>Location: {{ food.claimed_by.profile.location }}</p>

</div>

{% endfor %}
