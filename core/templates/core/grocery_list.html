<!DOCTYPE html>
<html>
<head>
    <title>My Groceries • Surplux</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f2e22,#1a3c2e,#e07b39);
            padding:40px 20px;
            color:white;
        }

        h2{text-align:center;margin-bottom:30px;}

        .card{
            max-width:700px;
            margin:20px auto;
            padding:20px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }

        img{
            width:100%;
            max-height:260px;
            object-fit:cover;
            border-radius:15px;
            margin-bottom:15px;
        }

        p{margin:8px 0;font-size:14px;}
        b{color:#ffd8b8;}

        .empty{text-align:center;opacity:0.8;margin-top:50px;}
    </style>
</head>

<body>

<h2>🛒 My Grocery Listings</h2>

{% for item in groceries %}
<div class="card">
    <img src="{{ item.image.url }}">

    <p><b>Expiry Date:</b> {{ item.expiry_date }}</p>
    <p><b>Days Left:</b> {{ item.days_left }} days</p>
    <p><b>MRP:</b> ₹{{ item.mrp }}</p>
    <p><b>Discount:</b> {{ item.discount_percent }}%</p>
    <p><b>Final Price:</b> ₹{{ item.final_price }}</p>
</div>
{% empty %}
<div class="empty">
    <p>No grocery items added yet.</p>
</div>
{% endfor %}

</body>
</html>
