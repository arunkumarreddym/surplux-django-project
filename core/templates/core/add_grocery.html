<!DOCTYPE html>
<html>
<head>
    <title>Add Grocery • Surplux</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#0f2e22,#1a3c2e,#e07b39);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:95%;
            max-width:650px;
            padding:35px;
            border-radius:20px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.15);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
            color:white;
        }

        h2{text-align:center;margin-bottom:25px;font-weight:600;}

        label{font-size:14px;opacity:0.9;}

        input[type="number"],
        input[type="date"],
        input[type="file"]{
            width:100%;
            padding:10px;
            margin-top:6px;
            margin-bottom:18px;
            border-radius:10px;
            border:none;
            outline:none;
        }

        .btn{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:none;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            color:white;
            background:linear-gradient(90deg,#1a3c2e,#e07b39);
            box-shadow:0 0 15px rgba(224,123,57,0.4);
            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 0 25px rgba(224,123,57,0.6);
        }

        .back{text-align:center;margin-top:15px;font-size:13px;}
        .back a{color:#ffd8b8;text-decoration:none;}
    </style>
</head>

<body>
<div class="card">
    <h2>🛒 Add Grocery Item</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Upload Grocery Photo</label>
        <input type="file" name="image" required>

        <label>Expiry Date</label>
        <input type="date" name="expiry_date" required>

        <label>MRP Price (₹)</label>
        <input type="number" step="0.01" name="mrp" placeholder="Enter MRP" required>

        <button class="btn" type="submit">✨ Calculate Discount & Add</button>
    </form>

    <div class="back">
        <a href="{% url 'donor_dashboard' %}">⬅ Back to Dashboard</a>
    </div>
</div>
</body>
</html>
